<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D_MATT | Contacto</title>
    <link rel="shortcut icon" href="./recursos/logo-3dmatt.jpeg" type="image/x-icon">
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/contacto.css">
</head>

<body>

    <header class="header">
        <a href="./index.html">
            <img class="header-logo" src="./recursos/logo-3dmatt.png" alt="logo-3dmatt">
        </a>

        <nav class="navbar">
            <ul>
                <li><a href="./index.html">Inicio</a></li>
                <li><a href="./contacto.html" class="active">Contacto</a></li>
                <li><a href="./admin.html">Administración</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contacto-container">

            <h1>Contacto</h1>

            <p class="contacto-descripcion">
                Esta dirección no es un punto de venta comercial.
                Cualquier consulta comunicarse al Whatsapp 3525-41-3549.
            </p>

            <div class="info-contacto">
                <div>
                    <img src="./recursos/whatsapp-icon.png" alt="icono whatsapp">
                    <p>+3525413549</p>
                </div>

                <div>
                    <img src="./recursos/telefono-icono.png" alt="icono teléfono">
                    <p>+3525413549</p>
                </div>

                <div>
                    <img src="./recursos/email-icon.png" alt="icono email">
                    <p>14mateobergagna14@gmail.com</p>
                </div>

                <div>
                    <img src="./recursos/maps.png" alt="icono mapa">
                    <p>Belgrano 323 - Córdoba</p>
                </div>
            </div>

            <form action="./contacto.html" method="post" class="contacto-form">
                <label for="id-nombre">Nombre</label>
                <input type="text" id="id-nombre" name="nombre">

                <label for="id-mail">Email</label>
                <input type="email" id="id-mail" name="email">

                <label for="id-telefono">Teléfono</label>
                <input type="tel" id="id-telefono" name="telefono">

                <label for="id-mensaje">Mensaje</label>
                <textarea id="id-mensaje" name="mensaje"></textarea>

                <button type="submit">Enviar</button>
            </form>

        </section>
    </main>

  <footer class="footer">
        <ul class="footer-redes">
            <li>
                <a href="https://mail.google.com/" target="_blank">
                    <img src="./recursos/email-icon (2).png" alt="email-icon">
                </a>
            </li>
            <li>
                <a href="https://wa.me/3525413549" target="_blank">
                    <img src="./recursos/whatsapp-icon (2).png" alt="whatsapp-icon">
                </a>
            </li>
            <li>
                <a href="https://www.instagram.com/3d_matt" target="_blank">
                    <img src="./recursos/logotipo-de-instagram (2).png" alt="instagram-icon">
                </a>
            </li>
        </ul>
    </footer>
    <script type="module" src="recursos/js/app.js"></script>
